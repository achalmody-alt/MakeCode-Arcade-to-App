name: Cross-Platform App Builder

on:
  push:
    branches: [ master, main ]

jobs:
  build:
    name: Package All Platforms
    runs-on: ubuntu-latest

    steps:
      - name: Create Clean Web Assets
        run: |
          mkdir -p dist
          curl -L "https://makecode.com" -o dist/binary.js || true
          
          cat << 'EOF' > dist/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
              <title>XPTIMESOS V 1.5</title>
              <style>
                  body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
                  iframe { width: 100%; height: 100%; border: none; }
              </style>
          </head>
          <body>
              <iframe src="https://makecode.com"></iframe>
          </body>
          </html>
          EOF

      - name: Save Web App Package
        uses: actions/upload-artifact@v4
        with:
          name: XPTIMESOS-Universal-Bundle
          path: dist/
